<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدربون | معهد القادة الدولية للتدريب الأهلي</title>
  <meta name="description" content="تعرّف على فريق المدربين والخبراء في معهد القادة الدولية للتدريب الأهلي — الكويت." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.theleaders-kw.com/trainers.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="المدربون | معهد القادة الدولية للتدريب الأهلي" />
  <meta property="og:description" content="تعرّف على فريق المدربين المحترفين في معهد القادة الدولية." />
  <meta property="og:image" content="https://www.theleaders-kw.com/logo.jpeg" />
  <meta property="og:url" content="https://www.theleaders-kw.com/trainers.html" />
  <meta property="og:locale" content="ar_KW" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
</head>
<body>
  <div id="app"></div>
  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const app = document.getElementById('app');

    let trainersHTML = '';
    TRAINERS.forEach(function(t) {
      const specialtiesHTML = t.specialties.map(function(s) {
        return '<span style="font-size:0.75rem;background:rgba(195,144,0,0.1);color:var(--gold);padding:0.3rem 0.8rem;border-radius:50px">' + s + '</span>';
      }).join('');

      trainersHTML += `
        <div class="trainer-card reveal">
          <div class="trainer-image">
            ${t.image ? '<img src="' + t.image + '" alt="' + t.name + '" />' : '<div class="trainer-placeholder"><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>'}
          </div>
          <div class="trainer-info">
            <h3>${t.name}</h3>
            <p class="trainer-title">${t.title}</p>
            <p class="trainer-bio">${t.bio}</p>
            ${t.specialties.length ? '<div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.8rem">' + specialtiesHTML + '</div>' : ''}
          </div>
        </div>`;
    });

    app.innerHTML = getNavbar('trainers') + `
      <section class="page-hero">
        <div class="container">
          <span class="section-tag">فريق العمل</span>
          <h1 class="page-hero-title">المدربون <span class="gold">والخبراء</span></h1>
          <div class="section-line" style="margin:1.5rem auto"></div>
          <p class="section-desc">فريق من الكفاءات الوطنية والعالمية ذات الخبرة في مجالات التدريب والاستشارات.</p>
        </div>
      </section>

      <section class="section trainers-section">
        <div class="container">
          <div class="trainers-grid">
            ${trainersHTML}
          </div>
        </div>
      </section>

    ` + getFooter() + getWhatsAppButton();

    initScript();
  });
  </script>
  <script src="script.js"></script>
</body>
</html>
