<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تواصل معنا | معهد القادة الدولية للتدريب الأهلي</title>
  <meta name="description" content="تواصل مع معهد القادة الدولية للتدريب الأهلي — مجمع الأندلس، الكويت. واتساب وهاتف وبريد وخريطة الموقع." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.theleaders-kw.com/contact.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="تواصل معنا | معهد القادة الدولية للتدريب الأهلي" />
  <meta property="og:description" content="تواصل مع معهد القادة الدولية للتدريب الأهلي — مجمع الأندلس، الكويت. واتساب وهاتف وبريد وخريطة الموقع." />
  <meta property="og:image" content="https://www.theleaders-kw.com/logo.jpeg" />
  <meta property="og:url" content="https://www.theleaders-kw.com/contact.html" />
  <meta property="og:locale" content="ar_KW" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/jpeg" href="logo.jpeg" />
</head>
<body>
  <div id="app"></div>
  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const app = document.getElementById('app');

    app.innerHTML = getNavbar('contact') + `
      <section class="page-hero">
        <div class="container">
          <span class="section-tag">تواصل معنا</span>
          <h1 class="page-hero-title">نحن هنا <span class="gold">لمساعدتك</span></h1>
          <div class="section-line" style="margin:1.5rem auto"></div>
        </div>
      </section>

      <section class="section contact-section">
        <div class="container">
          <div class="contact-grid">

            <!-- CONTACT INFO -->
            <div class="contact-info reveal-right">
              <h2>معلومات التواصل</h2>
              <p style="color:var(--text-muted);margin-bottom:2rem">لا تتردد في التواصل معنا لأي استفسار.</p>

              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                </div>
                <div>
                  <h4>العنوان</h4>
                  <p>${SITE.contact.addressFull}</p>
                </div>
              </div>

              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                  <h4>البريد الإلكتروني</h4>
                  <p><a href="mailto:${SITE.contact.email}" style="color:var(--gold);text-decoration:none">${SITE.contact.email}</a></p>
                </div>
              </div>

              ${SITE.contact.phone ? `
              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                </div>
                <div>
                  <h4>الهاتف</h4>
                  <p><a href="tel:${SITE.contact.phone}" style="color:var(--gold);text-decoration:none" dir="ltr">${SITE.contact.phone}</a></p>
                </div>
              </div>` : ''}

              ${SITE.contact.whatsapp ? `
              <div class="contact-info-item">
                <div class="contact-info-icon" style="background:rgba(37,211,102,0.1);color:#25d366">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                </div>
                <div>
                  <h4>واتساب</h4>
                  <p><a href="https://wa.me/${SITE.contact.whatsapp}" target="_blank" rel="noopener" style="color:#25d366;text-decoration:none">تواصل عبر واتساب</a></p>
                </div>
              </div>` : ''}

            </div>

            <!-- CONTACT FORM -->
            <div class="contact-form-wrapper reveal-left">
              <h2>أرسل لنا رسالة</h2>
              <form class="contact-form" onsubmit="handleSubmit(event)">
                <div class="form-group">
                  <label for="name">الاسم الكامل</label>
                  <input type="text" id="name" name="name" required placeholder="أدخل اسمك الكامل" />
                </div>
                <div class="form-group">
                  <label for="email">البريد الإلكتروني</label>
                  <input type="email" id="email" name="email" required placeholder="example@email.com" dir="ltr" />
                </div>
                <div class="form-group">
                  <label for="phone">رقم الهاتف</label>
                  <input type="tel" id="phone" name="phone" placeholder="+965 XXXX XXXX" dir="ltr" />
                </div>
                <div class="form-group">
                  <label for="subject">الموضوع</label>
                  <input type="text" id="subject" name="subject" required placeholder="موضوع الرسالة" />
                </div>
                <div class="form-group">
                  <label for="message">الرسالة</label>
                  <textarea id="message" name="message" rows="5" required placeholder="اكتب رسالتك هنا..."></textarea>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;justify-content:center">
                  إرسال الرسالة
                </button>
              </form>
            </div>

          </div>
        </div>
      </section>

      ${getLocationSuite()}
    ` + getFooter() + getWhatsAppButton();

    window.handleSubmit = function(e) {
      e.preventDefault();
      var name = document.getElementById('name').value;
      var email = document.getElementById('email').value;
      var phone = document.getElementById('phone').value;
      var subject = document.getElementById('subject').value;
      var message = document.getElementById('message').value;

      if (SITE.contact.whatsapp) {
        var waMsg = 'مرحبًا، أنا ' + name + '%0Aالبريد: ' + email + '%0Aالهاتف: ' + phone + '%0Aالموضوع: ' + subject + '%0A%0A' + message;
        window.open('https://wa.me/' + SITE.contact.whatsapp + '?text=' + waMsg, '_blank');
      } else {
        var mailtoLink = 'mailto:' + SITE.contact.email + '?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent('الاسم: ' + name + '\nالبريد: ' + email + '\nالهاتف: ' + phone + '\n\n' + message);
        window.location.href = mailtoLink;
      }
    };

    initScript();
  });
  </script>
  <script src="script.js"></script>
</body>
</html>
